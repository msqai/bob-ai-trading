name: Generate Bob mood references (Phase E1)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet pillow

      - name: Generate 8 mood references via Ideogram Character
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          OUT_DIR: assets
        run: python3 scripts/generate_refs.py

      - name: Commit + push regenerated references
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/bob_chill_winning.png assets/bob_smug_winning.png \
                  assets/bob_slumped_losing.png assets/bob_defeated_losing.png \
                  assets/bob_hunched_focused.png assets/bob_alert_skeptical.png \
                  assets/bob_asleep_inactive.png assets/bob_worried_volatile.png
          if git diff --cached --quiet; then
            echo "No changes to commit (all references identical)"
          else
            git commit -m "Phase E1: regenerate 8 mood references using IPAdapter for character consistency"
            git push origin HEAD:main
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bob-mood-refs-e1
          path: assets/bob_*.png
          retention-days: 3
