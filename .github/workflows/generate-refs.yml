name: Generate Bob mood references (one-off)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate references
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: python3 scripts/generate_refs.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bob-mood-refs
          path: out/
          retention-days: 1
